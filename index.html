<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000d14">
<title>MECH-AI · Diagnostic System</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00c8ff;
    --cyan-dim: rgba(0,200,255,0.15);
    --cyan-faint: rgba(0,200,255,0.04);
    --red: #ff3c3c;
    --orange: #ffaa00;
    --green: #00ff88;
    --bg: #000d14;
    --panel: rgba(0,20,35,0.92);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--cyan); font-family: 'Share Tech Mono', monospace; overflow-x: hidden; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,200,255,0.025) 2px, rgba(0,200,255,0.025) 4px);
    pointer-events: none; z-index: 0;
  }

  .glow-orb {
    position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 300px;
    background: radial-gradient(ellipse, rgba(0,150,255,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* BOOT SCREEN */
  #boot {
    position: fixed; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
    z-index: 999; transition: opacity 0.6s;
  }
  #boot.hidden { opacity: 0; pointer-events: none; }
  #boot-text {
    width: min(520px, 88vw);
    font-size: 12px; line-height: 2.2;
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan);
    white-space: pre-wrap;
  }
  .cursor {
    display: inline-block; width: 8px; height: 14px;
    background: var(--cyan); vertical-align: middle;
    animation: blink 1s infinite;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(0,10,20,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,200,255,0.15);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-ring {
    width: 34px; height: 34px; border: 2px solid var(--cyan); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .logo-dot { width: 10px; height: 10px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 10px var(--cyan); }
  .logo-pulse {
    position: absolute; inset: -5px; border: 1px solid rgba(0,200,255,0.3);
    border-radius: 50%; animation: ping 2.5s ease-out infinite;
  }
  .logo-title { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 12px var(--cyan); }
  .logo-sub { font-size: 8px; color: rgba(0,200,255,0.5); letter-spacing: 2px; margin-top: 1px; }
  .hud-status { text-align: right; font-size: 10px; }
  #clock { color: rgba(0,200,255,0.6); letter-spacing: 1px; }
  #status-label { font-size: 9px; letter-spacing: 2px; margin-top: 2px; color: rgba(0,200,255,0.4); }

  /* CORNER MARKERS */
  .corner { position: fixed; width: 20px; height: 20px; pointer-events: none; z-index: 1; }
  .corner.tl { top: 12px; left: 12px; border-top: 1px solid rgba(0,200,255,0.3); border-left: 1px solid rgba(0,200,255,0.3); }
  .corner.tr { top: 12px; right: 12px; border-top: 1px solid rgba(0,200,255,0.3); border-right: 1px solid rgba(0,200,255,0.3); }
  .corner.bl { bottom: 12px; left: 12px; border-bottom: 1px solid rgba(0,200,255,0.3); border-left: 1px solid rgba(0,200,255,0.3); }
  .corner.br { bottom: 12px; right: 12px; border-bottom: 1px solid rgba(0,200,255,0.3); border-right: 1px solid rgba(0,200,255,0.3); }

  /* MAIN */
  main { max-width: 680px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }

  /* VIEWFINDER */
  #viewfinder {
    position: relative; background: #000;
    border: 1px solid rgba(0,200,255,0.2); border-radius: 4px;
    overflow: hidden; aspect-ratio: 16/9; margin-bottom: 14px;
    transition: border-color 0.4s;
  }
  .hud-corner { position: absolute; width: 22px; height: 22px; z-index: 10; transition: border-color 0.4s; }
  .hud-corner.tl { top: 8px; left: 8px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .hud-corner.tr { top: 8px; right: 8px; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
  .hud-corner.bl { bottom: 8px; left: 8px; border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .hud-corner.br { bottom: 8px; right: 8px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

  #scanline {
    display: none; position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    box-shadow: 0 0 14px var(--cyan); z-index: 20;
    animation: scanline 1.4s linear infinite;
  }

  #video { width: 100%; height: 100%; object-fit: cover; display: none; }
  #snapshot { width: 100%; height: 100%; object-fit: cover; display: none; transition: filter 0.5s; }
  #canvas { display: none; }

  #standby {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 10px; opacity: 0.35;
  }
  #standby svg { width: 52px; height: 52px; }
  #standby .s1 { font-size: 10px; letter-spacing: 3px; }
  #standby .s2 { font-size: 9px; color: rgba(0,200,255,0.5); }

  #analyzing-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(0,10,20,0.75); z-index: 15;
    flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 2px solid rgba(0,200,255,0.15);
    border-top: 2px solid var(--cyan);
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  .analyzing-text { font-size: 11px; letter-spacing: 4px; text-shadow: 0 0 8px var(--cyan); }
  .analyzing-sub { font-size: 9px; color: rgba(0,200,255,0.5); letter-spacing: 2px; }

  #live-tag {
    display: none; position: absolute; bottom: 10px; left: 12px;
    font-size: 9px; color: rgba(0,200,255,0.7); letter-spacing: 2px; z-index: 10;
  }

  /* CONTROLS */
  #controls { display: flex; gap: 10px; margin-bottom: 14px; }
  .btn {
    flex: 1; padding: 14px 0;
    font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 3px;
    cursor: pointer; border-radius: 2px; text-transform: uppercase;
    transition: all 0.2s; border: none; outline: none;
  }
  .btn-primary {
    background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
  }
  .btn-primary:active { background: var(--cyan); color: #000; }
  .btn-scan {
    flex: 2; background: var(--cyan); color: #000; font-weight: 700; border: none;
  }
  .btn-scan:active { background: #009ec8; }
  .btn-danger {
    background: transparent; border: 1px solid rgba(255,60,60,0.4); color: var(--red);
  }
  .btn-danger:active { background: var(--red); color: #000; }

  /* ERROR */
  #error-box {
    display: none; border: 1px solid rgba(255,60,60,0.3); background: #1a0000;
    padding: 14px; border-radius: 2px; color: #ff6666;
    font-size: 11px; letter-spacing: 1px; margin-bottom: 14px; line-height: 1.7;
  }

  /* RESULTS */
  #results { display: none; border-radius: 4px; overflow: hidden; border: 1px solid rgba(0,200,255,0.25); }
  #results-header {
    background: rgba(0,200,255,0.07); border-bottom: 1px solid rgba(0,200,255,0.2);
    padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  #results-title { font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 3px; }
  #results-ts { font-size: 9px; color: rgba(0,200,255,0.5); }
  #results-body { padding: 16px; font-size: 12px; line-height: 1.9; background: var(--panel); }

  .line-head { color: var(--cyan); font-weight: 700; margin-top: 14px; font-size: 13px; letter-spacing: 1px; }
  .line-bold { color: #fff; font-weight: 600; margin-top: 4px; }
  .line-step { color: #a0cfe0; padding-left: 12px; margin-top: 4px; border-left: 2px solid rgba(0,200,255,0.25); }
  .line-critical { color: var(--red); font-weight: 700; font-size: 13px; }
  .line-warning { color: var(--orange); font-weight: 700; font-size: 13px; }
  .line-allclear { color: var(--green); font-weight: 700; font-size: 13px; }
  .line-routine { color: var(--cyan); font-weight: 700; font-size: 13px; }
  .line-normal { color: #7ab0c8; margin-top: 2px; }

  /* FOOTER */
  footer { text-align: center; padding: 24px 0 32px; font-size: 9px; color: rgba(0,200,255,0.18); letter-spacing: 2px; position: relative; z-index: 1; }

  /* ANIMATIONS */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes ping { 0%{transform:scale(1);opacity:0.5} 100%{transform:scale(1.7);opacity:0} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes scanline { 0%{top:-2px} 100%{top:100%} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.2); }
</style>
</head>
<body>

<!-- Boot screen -->
<div id="boot">
  <div id="boot-text"></div>
</div>

<div class="glow-orb"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<header>
  <div class="logo">
    <div class="logo-ring">
      <div class="logo-dot"></div>
      <div class="logo-pulse"></div>
    </div>
    <div>
      <div class="logo-title">MECH-AI</div>
      <div class="logo-sub">AUTOMOTIVE DIAGNOSTIC SYSTEM</div>
    </div>
  </div>
  <div class="hud-status">
    <div id="clock">--:--:--</div>
    <div id="status-label">○ STANDBY</div>
  </div>
</header>

<main>
  <!-- Viewfinder -->
  <div id="viewfinder">
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>
    <div id="scanline"></div>

    <video id="video" autoplay playsinline muted></video>
    <img id="snapshot" alt="Captured frame">
    <canvas id="canvas"></canvas>

    <div id="standby">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="26" r="11" stroke="#00c8ff" stroke-width="1.5"/>
        <circle cx="26" cy="26" r="4" fill="#00c8ff"/>
        <rect x="4" y="18" width="9" height="16" rx="2" stroke="#00c8ff" stroke-width="1.5"/>
        <line x1="13" y1="22" x2="17" y2="22" stroke="#00c8ff" stroke-width="1.5"/>
        <line x1="13" y1="30" x2="17" y2="30" stroke="#00c8ff" stroke-width="1.5"/>
        <rect x="39" y="18" width="9" height="16" rx="2" stroke="#00c8ff" stroke-width="1.5"/>
        <line x1="26" y1="4" x2="26" y2="10" stroke="#00c8ff" stroke-width="1.5"/>
        <line x1="26" y1="42" x2="26" y2="48" stroke="#00c8ff" stroke-width="1.5"/>
      </svg>
      <div class="s1">CAMERA OFFLINE</div>
      <div class="s2">ACTIVATE TO BEGIN SCAN</div>
    </div>

    <div id="analyzing-overlay">
      <div class="spinner"></div>
      <div class="analyzing-text">ANALYZING...</div>
      <div class="analyzing-sub">RUNNING DIAGNOSTIC ENGINE</div>
    </div>

    <div id="live-tag">● LIVE FEED</div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button class="btn btn-primary" id="btn-activate" onclick="startCamera()">◉ ACTIVATE CAMERA</button>
  </div>

  <!-- Error -->
  <div id="error-box"></div>

  <!-- Results -->
  <div id="results">
    <div id="results-header">
      <div id="results-title">DIAGNOSTIC REPORT</div>
      <div id="results-ts"></div>
    </div>
    <div id="results-body"></div>
  </div>
</main>

<footer>MECH-AI · CARS & MOTORCYCLES · DIAGNOSTIC ENGINE v2.4</footer>

<script>
const SYSTEM_PROMPT = `You are MECH-AI, an expert automotive and motorcycle mechanic assistant with deep knowledge of cars and bikes of all makes and models. You have the visual intelligence of a seasoned master mechanic.

When shown an image, you will:
1. IDENTIFY what you see — parts, components, make/model if visible, condition
2. DIAGNOSE any visible problems, wear, damage, or issues
3. PROVIDE step-by-step guidance for repair or maintenance
4. RATE urgency: CRITICAL / WARNING / ROUTINE / ALL CLEAR

Format your response with these exact sections:
🔍 SCAN COMPLETE
**Identified:** [what you see]

⚠️ DIAGNOSIS
[problems found, or "No visible issues detected"]

🔧 ACTION PLAN
[numbered steps for repair/maintenance]

📊 STATUS: [CRITICAL / WARNING / ROUTINE / ALL CLEAR]

Keep language clear, direct, and practical — like a trusted mechanic talking to you in the garage. If no vehicle or part is visible, ask the user to point the camera at the component they need help with.`;

let mediaStream = null;
let state = 'standby'; // standby | live | analyzing | result

// Clock
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB');
}
setInterval(updateClock, 1000);
updateClock();

// Boot sequence
const bootLines = [
  "MECH-AI v2.4.1 INITIALIZING...",
  "Loading automotive knowledge base...",
  "Calibrating vision systems...",
  "Neural diagnostic engine: ONLINE",
  "Camera interface: READY",
  "SYSTEM READY. Point camera at vehicle component.",
];

function runBoot() {
  const el = document.getElementById('boot-text');
  let i = 0, charIdx = 0, text = '';
  const iv = setInterval(() => {
    if (i >= bootLines.length) {
      clearInterval(iv);
      setTimeout(() => {
        document.getElementById('boot').classList.add('hidden');
        setTimeout(() => document.getElementById('boot').remove(), 700);
      }, 500);
      return;
    }
    if (charIdx < bootLines[i].length) {
      text += bootLines[i][charIdx++];
    } else {
      text += '\n'; i++; charIdx = 0;
    }
    el.innerHTML = text + '<span class="cursor"></span>';
  }, 26);
}
runBoot();

function setStatus(label, color) {
  const el = document.getElementById('status-label');
  el.textContent = label;
  el.style.color = color || 'rgba(0,200,255,0.4)';
}

function setHudColor(color) {
  document.querySelectorAll('.hud-corner').forEach(c => {
    c.style.borderColor = color;
  });
  document.getElementById('viewfinder').style.borderColor = color + '55';
  document.getElementById('results').style.borderColor = color + '55';
  document.getElementById('results-header').style.borderBottomColor = color + '44';
  document.getElementById('results-title').style.color = color;
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}
function clearError() {
  document.getElementById('error-box').style.display = 'none';
}

async function startCamera() {
  clearError();
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = mediaStream;
    video.style.display = 'block';
    document.getElementById('standby').style.display = 'none';
    document.getElementById('snapshot').style.display = 'none';
    document.getElementById('live-tag').style.display = 'block';
    document.getElementById('scanline').style.display = 'block';

    document.getElementById('controls').innerHTML = `
      <button class="btn btn-scan" onclick="captureAndAnalyze()">⬡ SCAN & ANALYZE</button>
      <button class="btn btn-danger" onclick="stopCamera()">✕</button>
    `;
    document.getElementById('results').style.display = 'none';
    setStatus('● CAMERA LIVE', '#00ff88');
    state = 'live';
  } catch(e) {
    showError('Camera access denied. In Chrome: tap the camera icon in the address bar and allow access, then reload.');
  }
}

function stopCamera() {
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  document.getElementById('video').style.display = 'none';
  document.getElementById('live-tag').style.display = 'none';
  document.getElementById('scanline').style.display = 'none';
}

async function captureAndAnalyze() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const snapshot = document.getElementById('snapshot');

  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  const base64 = dataUrl.split(',')[1];

  stopCamera();
  snapshot.src = dataUrl;
  snapshot.style.display = 'block';
  snapshot.style.filter = 'brightness(0.55) hue-rotate(160deg)';
  document.getElementById('standby').style.display = 'none';

  const overlay = document.getElementById('analyzing-overlay');
  overlay.style.display = 'flex';
  document.getElementById('scanline').style.display = 'block';

  document.getElementById('controls').innerHTML = '';
  setStatus('● ANALYZING', '#ffaa00');
  setHudColor('#ffaa00');
  state = 'analyzing';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
            { type: 'text', text: 'Analyze this image. Identify any vehicle parts, diagnose issues, and provide repair guidance.' }
          ]
        }]
      })
    });

    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    showResult(text);
  } catch(e) {
    showResult('⚠️ Analysis failed. Please check your connection and try again.');
  }

  overlay.style.display = 'none';
  document.getElementById('scanline').style.display = 'none';
  snapshot.style.filter = 'none';
  state = 'result';
}

function getStatusColor(text) {
  if (!text) return '#00c8ff';
  if (text.includes('CRITICAL')) return '#ff3c3c';
  if (text.includes('WARNING')) return '#ffaa00';
  if (text.includes('ALL CLEAR')) return '#00ff88';
  if (text.includes('ROUTINE')) return '#00c8ff';
  return '#00c8ff';
}

function formatResult(text) {
  return text.split('\n').map(line => {
    if (!line.trim()) return '<div style="height:4px"></div>';
    if (line.match(/^[🔍⚠️🔧📊]/u)) return `<div class="line-head">${line}</div>`;
    if (line.startsWith('**') && line.endsWith('**')) return `<div class="line-bold">${line.replace(/\*\*/g,'')}</div>`;
    if (line.match(/^\d+\./)) return `<div class="line-step">${line}</div>`;
    if (line.includes('CRITICAL')) return `<div class="line-critical">${line}</div>`;
    if (line.includes('WARNING')) return `<div class="line-warning">${line}</div>`;
    if (line.includes('ALL CLEAR')) return `<div class="line-allclear">${line}</div>`;
    if (line.includes('ROUTINE')) return `<div class="line-routine">${line}</div>`;
    return `<div class="line-normal">${line}</div>`;
  }).join('');
}

function showResult(text) {
  const color = getStatusColor(text);
  setHudColor(color);
  setStatus('● SCAN COMPLETE', color);

  document.getElementById('results-ts').textContent = new Date().toLocaleString();
  document.getElementById('results-body').innerHTML = formatResult(text);

  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';
  resultsEl.style.animation = 'fadeIn 0.4s ease';

  document.getElementById('controls').innerHTML = `
    <button class="btn btn-primary" onclick="resetScan()">↺ NEW SCAN</button>
  `;
}

function resetScan() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('snapshot').style.display = 'none';
  document.getElementById('standby').style.display = 'flex';
  document.getElementById('controls').innerHTML = `
    <button class="btn btn-primary" id="btn-activate" onclick="startCamera()">◉ ACTIVATE CAMERA</button>
  `;
  setStatus('○ STANDBY', 'rgba(0,200,255,0.4)');
  setHudColor('#00c8ff');
  clearError();
  state = 'standby';
}
</script>
</body>
</html>
